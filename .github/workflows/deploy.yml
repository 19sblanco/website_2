name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      ARTIFACT_REPO: portfolio
      BACKEND_SERVICE: portfolio-backend
      FRONTEND_SERVICE: portfolio-frontend
      BACKEND_SA: portfolio-backend@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
      FRONTEND_SA: portfolio-frontend@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push backend image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/backend:${{ github.sha }}"
          docker build -t "$IMAGE" src/backend
          docker push "$IMAGE"
          echo "BACKEND_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Build and push frontend image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/frontend:${{ github.sha }}"
          docker build -t "$IMAGE" src/frontend
          docker push "$IMAGE"
          echo "FRONTEND_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy backend
        run: |
          gcloud run deploy "${{ env.BACKEND_SERVICE }}" \
            --image "$BACKEND_IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --no-allow-unauthenticated \
            --service-account "${{ env.BACKEND_SA }}" \
            --add-cloudsql-instances "${{ secrets.CLOUDSQL_INSTANCE }}" \
            --set-secrets "ConnectionStrings__DefaultConnection=db-connection:latest,ContactEmail__Password=contact-email-password:latest,ContactEmail__Username=contact-email-username:latest" \
            --set-env-vars "MigrateDatabase=true" \
            --port 8080

      - name: Resolve backend URL
        run: |
          BACKEND_URL=$(gcloud run services describe "${{ env.BACKEND_SERVICE }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --format='value(status.url)')
          echo "BACKEND_URL=$BACKEND_URL" >> "$GITHUB_ENV"

      - name: Grant frontend invoker access to backend
        run: |
          gcloud run services add-iam-policy-binding "${{ env.BACKEND_SERVICE }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --member="serviceAccount:${{ env.FRONTEND_SA }}" \
            --role="roles/run.invoker" \
            --quiet

      - name: Deploy frontend
        run: |
          gcloud run deploy "${{ env.FRONTEND_SERVICE }}" \
            --image "$FRONTEND_IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --allow-unauthenticated \
            --service-account "${{ env.FRONTEND_SA }}" \
            --set-env-vars "BACKEND_URL=${BACKEND_URL}" \
            --port 8080

      - name: Print frontend URL
        run: |
          gcloud run services describe "${{ env.FRONTEND_SERVICE }}" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ env.GCP_PROJECT_ID }}" \
            --format='value(status.url)'
