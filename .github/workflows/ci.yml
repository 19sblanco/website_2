name: CI

on:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: make docker-build-frontend

      - name: Run unit tests
        run: docker run frontend-prod npm run unit

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: make docker-build-backend

      - name: Run tests
        run: docker run backend-prod dotnet test
