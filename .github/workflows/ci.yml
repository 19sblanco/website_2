name: CI

on:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Check format, lint, and build
        working-directory: src/frontend
        run: |
          npm run format:check
          npm run lint
          npm run build

      - name: Run unit tests
        working-directory: src/frontend
        run: npm run unit

  backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Check format and build
        working-directory: src/backend
        run: |
          dotnet format --verify-no-changes WebServer/WebServer.csproj
          dotnet build WebServer/WebServer.csproj

      - name: Run tests
        working-directory: src/backend
        run: dotnet test
