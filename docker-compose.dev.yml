services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    user: "${UID}:${GID}"
    ports:
      - "5089:5089"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    user: "${UID}:${GID}"
    ports:
      - "5173:5173" # Vite dev port
    environment:
      - VITE_API_URL=http://localhost:5089
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
