# Dev Container compose: IDE attaches to `dev`; API and Vite run as processes inside it.
services:
  dev:
    image: 2.0-website-devcontainer:latest
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    working_dir: /workspace
    ports:
      - "5089:5089"
      - "5173:5173"
    volumes:
      - ..:/workspace:cached
      - backend-obj:/workspace/src/backend/WebServer/obj
      - backend-bin:/workspace/src/backend/WebServer/bin
      - backend-tests-obj:/workspace/src/backend/WebServer.Tests/obj
      - backend-tests-bin:/workspace/src/backend/WebServer.Tests/bin
      - frontend-node_modules:/workspace/src/frontend/node_modules
      - playwright-cache:/home/vscode/.cache/ms-playwright
    depends_on:
      database:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  database:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: portfolio
      MYSQL_USER: appuser
      MYSQL_PASSWORD: appsecret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pmysql"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  backend-obj:
  backend-bin:
  backend-tests-obj:
  backend-tests-bin:
  frontend-node_modules:
  playwright-cache:
  mysql_data:
