# Standalone compose for the Dev Container. Brings up the full dev stack; the editor
# attaches to `backend` so Roslyn and dotnet share one set of build artifacts.
services:
  backend:
    build:
      context: ../src/backend
      dockerfile: Dockerfile.dev
    command: sleep infinity
    working_dir: /workspace
    ports:
      - "5089:5089"
    volumes:
      - ..:/workspace:cached
      - backend-obj:/workspace/src/backend/WebServer/obj
      - backend-bin:/workspace/src/backend/WebServer/bin
      - backend-tests-obj:/workspace/src/backend/WebServer.Tests/obj
      - backend-tests-bin:/workspace/src/backend/WebServer.Tests/bin

  frontend:
    build:
      context: ../src/frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ../src/frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  database:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: portfolio
      MYSQL_USER: appuser
      MYSQL_PASSWORD: appsecret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  backend-obj:
  backend-bin:
  backend-tests-obj:
  backend-tests-bin:
  mysql_data:
